<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digimon Story</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <template id="party-digimon-template">
      <div class="party-digimon">
        <h2>Digimon Name - Lv 1</h2>
        <p>
          <img src="" alt="Digimon Image">
        </p>
        <table>
          <tr>
            <td><img src="https://cdn3.iconfinder.com/data/icons/retro-game-items/100/retro-11-512.png" width="100px"
                alt="Health heart"></td>
            <td><span class="hp-info">1000</span></td>
          </tr>
          <tr>
            <td><img src="https://th.bing.com/th/id/OIP.qyBr7Q3TibsSmP1PdvFOfgHaHa?pid=ImgDet&rs=1" width="100px"
                alt="Damage sword"></td>
            <td><span class="attack-info">100</span></td>
          </tr>
        </table>
        <button>Digivolve</button>
      </div>
    </template>
  <div id="starter-modal" class="modal">
    <section>
      <h2>Choose a Starter Digimon</h2>
      <div class="starter-selection">
        <h2>Koromon</h2>
        <!-- <img src="" alt=""> -->
        <button>Choose</button>
      </div>
      <div class="starter-selection">
        <h2>Tsunomon</h2>
        <!-- <img src="" alt=""> -->
        <button>Choose</button>
      </div>
      <div class="starter-selection">
        <h2>Tanemon</h2>
        <!-- <img src="" alt=""> -->
        <button>Choose</button>
      </div>
    </section>
  </div>

  <div id="digimon-info-modal" class="modal">
    <div id="modal-background">
      <button id="close-modal">X</button>
      <h2>Digimon Name</h2>
      <img src="" alt="">
      <p><span id="level-info">Level</span></p>
      <button>Digivolve</button>
    </div>
  </div>

  <!-- Div for the game window -->
  <div id="game-info">
    <!-- div for game info. Will put area/town information here -->
    <nav id="game-hub-dwds">
      <img
        src="https://vignette.wikia.nocookie.net/digimon/images/d/d3/Digimon_world_ds_logo.png/revision/latest?cb=20161124161643"
        alt="Digimon City">
      <nav>
        <button id="town-button" disabled>Town</button>
        <button id="areas-button">Areas</button>
        <button class="unimplemented">DigiConvert</button>
        <button class="unimplemented">DigiBank</button>
        <button class="unimplemented">DigiFarm</button>
        <button class="unimplemented">Quests</button>
      </nav>
    </nav>
    <section id="town-menu-dwds">

    </section>
    <section id="areas-menu-dwds">
      <div id="current-area-dwds">
        <div class="areas">
          <button id="prev-section-button">Prev</button> | <button class="unimplemented">Select Area</button> | <button id="next-section-button">Next</button>
        </div>
        <h2 id="area-name">Area Name</h2>
        <p><span class="bold">Wild Digimon: </span><span id="wild-digimon-list"></span></p>
        <!-- <img src="images/areas/dataForest.png" alt="Data Forest background"> -->
        <div id="enemy-digimon-dwds">
          <h3>Enemy Name</h3>
          <img src="" alt="Enemy Image">
          <p>Level X</p>
          <p>HP BAR GOES HERE</p>
        </div>
      </div>
      <button id="attack-button-dwds">Attack</button>
      <button id="flee-button-dwds">Flee</button>
    </section>
    <section id="party-box">
    </section>
  </div>
  <script type="module" src="scripts/main.js"></script>
</body>

</html>
